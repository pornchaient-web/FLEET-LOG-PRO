<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบบันทึกการทำงานและการใช้รถ</title>
    
    <link rel="manifest" href="manifest.json" id="pwa-manifest" />
    <link rel="apple-touch-icon" href="icon-192.png" id="pwa-apple-icon" />
    <link rel="icon" type="image/png" href="icon.png" id="pwa-favicon" />

    <!-- PWA configuration -->
    <script id="pwa-redirect-and-path">
      (function() {
        var path = window.location.pathname;
        var host = window.location.hostname;
        
        // 1. Handle trailing slash redirect for subdirectories on GitHub Pages or custom domains
        // If the path is a subdirectory without a trailing slash (e.g., /fleet-log-pro), redirect to /fleet-log-pro/
        if (path && path !== '/' && !path.endsWith('/') && !path.includes('.')) {
          window.location.replace(window.location.origin + path + '/' + window.location.search + window.location.hash);
          return;
        }

        // 2. Compute the precise PWA base path
        var basePath = '/';
        if (host.endsWith('.github.io')) {
          var segments = path.split('/').filter(Boolean);
          if (segments.length > 0) {
            basePath = '/' + segments[0] + '/';
          }
        } else {
          if (path.endsWith('.html')) {
            basePath = path.substring(0, path.lastIndexOf('/') + 1);
          } else {
            basePath = path.endsWith('/') ? path : path + '/';
          }
        }
        
        window.__PWA_BASE_PATH__ = basePath;

        // 3. Update PWA asset links with correct basePath and cache busting v3
        var version = 'v3';
        var mLink = document.getElementById('pwa-manifest');
        if (mLink) mLink.href = basePath + 'manifest.json?v=' + version;
        
        var aIcon = document.getElementById('pwa-apple-icon');
        if (aIcon) aIcon.href = basePath + 'icon-192.png?v=' + version;
        
        var fIcon = document.getElementById('pwa-favicon');
        if (fIcon) fIcon.href = basePath + 'icon.png?v=' + version;

        // 4. Capture beforeinstallprompt extremely early to prevent missing it in React load
        window.__PWA_DEFERRED_PROMPT__ = null;
        window.addEventListener('beforeinstallprompt', function(e) {
          e.preventDefault();
          window.__PWA_DEFERRED_PROMPT__ = e;
          console.log('PWA HTML: Captured beforeinstallprompt event early!');
          var event = new CustomEvent('pwa-prompt-captured', { detail: e });
          window.dispatchEvent(event);
        });
      })();
    </script>
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="บันทึกงาน&ใช้รถ" />
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
